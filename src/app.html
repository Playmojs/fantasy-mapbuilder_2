<!doctype html>
<html lang="en">

<head>
	<style>
		html {
			margin: 0;
			padding: 0;
			background-color: rgb(45, 45, 45);
			overflow: hidden;
		}
		
		body {
			margin: 0;
			overflow: hidden;
		}

		:root{
			 /* === COLORS === */
  
			/* Primary Colors - Choose from options above */
			--color-primary: #0d9488;
			--color-primary-light: #14b8a6;
			--color-primary-dark: #0f766e;
			
			/* Accent Colors */
			--color-accent: #d97706;
			--color-accent-light: #f59e0b;
			--color-accent-dark: #b45309;
			
			/* Success/Secondary */
			--color-success: #84cc16;
			--color-success-light: #a3e635;
			
			/* Neutrals - Consistent Gray Scale */
			--color-bg-primary: rgb(45, 45, 45);
			--color-bg-secondary: rgb(55, 55, 55);
			--color-bg-tertiary: rgb(65, 65, 65);
			
			--color-panel: rgb(60, 60, 60);
			--color-panel-hover: rgb(70, 70, 70);
			--color-panel-active: rgb(50, 50, 50);
			
			--color-border: rgb(80, 80, 80);
			--color-border-light: rgb(100, 100, 100);
			--color-border-hover: rgb(120, 120, 120);
			
			/* Text Colors */
			--color-text-primary: rgb(220, 220, 220);
			--color-text-secondary: rgb(180, 180, 180);
			--color-text-muted: rgb(140, 140, 140);
			--color-text-inverse: rgb(30, 30, 30);
			
			/* === SHADOWS === */
			
			/* Box Shadows - More Subtle */
			--shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
			--shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.5);
			--shadow-md: 0 4px 6px rgba(0, 0, 0, 0.6);
			--shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.7);
			--shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.8);
			
			/* Text Shadows - Reduced Intensity */
			--text-shadow-subtle: 1px 1px 2px rgba(0, 0, 0, 0.8);
			--text-shadow-base: 2px 2px 4px rgba(0, 0, 0, 0.8);
			--text-shadow-strong: 3px 3px 6px rgba(0, 0, 0, 0.9);
			
			/* === SPACING SCALE === */
			
			--space-xs: 4px;
			--space-sm: 8px;
			--space-md: 16px;
			--space-lg: 24px;
			--space-xl: 32px;
			--space-2xl: 48px;
			--space-3xl: 64px;
			--space-4xl: 96px;
			
			/* === BORDER RADIUS === */
			
			--radius-sm: 4px;
			--radius-md: 8px;
			--radius-lg: 12px;
			--radius-xl: 16px;
			--radius-2xl: 24px;
			--radius-full: 9999px;
			
			/* === TRANSITIONS === */
			
			--transition-fast: 150ms ease;
			--transition-base: 250ms ease;
			--transition-slow: 350ms ease;
			
			/* === TYPOGRAPHY SCALE === */
			
			--text-xs: 0.75rem;      /* 12px */
			--text-sm: 0.875rem;     /* 14px */
			--text-base: 1rem;       /* 16px */
			--text-lg: 1.125rem;     /* 18px */
			--text-xl: 1.25rem;      /* 20px */
			--text-2xl: 1.5rem;      /* 24px */
			--text-3xl: 1.875rem;    /* 30px */
			--text-4xl: 2.25rem;     /* 36px */
			--text-5xl: 3rem;        /* 48px */
			--text-6xl: 3.75rem;     /* 60px */
			--text-7xl: 4.5rem;      /* 72px */
			
			/* === LAYOUT === */
			
			--nav-height: 60px;
			--toolbar-height: 60px;
			--max-content-width: 1400px;
			
			/* === Z-INDEX SCALE === */
			
			--z-base: 1;
			--z-dropdown: 100;
			--z-sticky: 200;
			--z-fixed: 300;
			--z-modal-backdrop: 400;
			--z-modal: 500;
			--z-popover: 600;
			--z-tooltip: 700;
		}

		svg {
			color: var(--color-accent-dark);
		}
	</style>
	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/assets/dragon_icon_cropped.jpg" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">

	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
